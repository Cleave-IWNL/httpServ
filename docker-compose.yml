services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: payments
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://user:pass@db:5432/payments?sslmode=disable
      MIGRATIONS_PATH: migrations
      SERVER_PORT: "8080"
      LOG_LEVEL: info
      EXCHANGE_API_KEY: ${EXCHANGE_API_KEY}
    depends_on:
      - db

volumes:
  pg_data:
